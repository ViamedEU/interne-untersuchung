<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interne Fahrzeuguntersuchung</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-header img {
      height: 72px;
      width: auto;
      margin-bottom: 1rem;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
    }

    .card-header p {
      color: #718096;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
      min-width: 0;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.4rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      color: #2d3748;
      transition: border-color 0.2s;
      background: #f7fafc;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
      height: 48px;
      display: block;
      font-family: inherit;
    }

    textarea {
      height: auto;
      min-height: 84px;
      resize: vertical;
      line-height: 1.4;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4299e1;
      background: #fff;
    }

    [hidden] { display: none !important; }

    /* ==== Abschnitts-Überschriften ==== */
    .abschnitt {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #2b6cb0;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0.4rem;
      margin: 1.75rem 0 1rem;
    }

    /* ==== Fahrzeug-Auswahl ==== */
    .fahrzeug-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .fahrzeug-row select { flex: none; width: 90px; }
    .fahrzeug-sep {
      font-weight: 600;
      color: #4a5568;
      white-space: nowrap;
    }

    /* ==== Abgleich-Box (letzte Fahrzeugkontrolle) ==== */
    .abgleich {
      display: none;
      background: #ebf8ff;
      border: 1.5px solid #bee3f8;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      color: #2a4365;
      line-height: 1.5;
    }
    .abgleich.sichtbar { display: block; }
    .abgleich strong { display: block; margin-bottom: 0.3rem; }
    .abgleich .warn { color: #c05621; font-weight: 600; }
    .abgleich .fehler { color: #9b2c2c; }

    /* ==== Reifen-Raster ==== */
    .reifen-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .reifen-grid label { font-weight: 500; font-size: 0.8rem; }
    .reifen-grid input.warnung { border-color: #ed8936; background: #fffaf0; }
    .reifen-grid input.kritisch { border-color: #e53e3e; background: #fff5f5; }
    .reifen-hinweis {
      font-size: 0.78rem;
      color: #718096;
      margin-top: 0.4rem;
    }
    .reifen-hinweis .warn { color: #c05621; font-weight: 600; }
    .reifen-hinweis .kritisch { color: #9b2c2c; font-weight: 600; }

    /* ==== Prüfpunkt-Zeilen ==== */
    .pruef-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid #edf2f7;
    }
    .pruef-row:last-child { border-bottom: none; }
    .pruef-row .pruef-label {
      font-size: 0.9rem;
      color: #2d3748;
      flex: 1;
      margin: 0;
      font-weight: 500;
    }
    .pruef-row select {
      flex: none;
      width: 120px;
      height: 40px;
      padding: 0.35rem 0.6rem;
      font-size: 0.9rem;
    }
    .pruef-row select.ok { border-color: #48bb78; background: #f0fff4; color: #276749; }
    .pruef-row select.mangel { border-color: #e53e3e; background: #fff5f5; color: #9b2c2c; }

    /* ==== Schadenskizze ==== */
    .skizze-wrap {
      display: none;
      position: relative;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      touch-action: manipulation;
    }
    .skizze-wrap.sichtbar { display: block; }
    .skizze-wrap img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .skizze-marker {
      position: absolute;
      width: 26px;
      height: 26px;
      margin: -13px 0 0 -13px;
      border-radius: 50%;
      background: #e53e3e;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      cursor: pointer;
    }
    .skizze-hinweis {
      font-size: 0.78rem;
      color: #718096;
      margin-top: 0.4rem;
    }
    .marker-liste { margin-top: 0.75rem; }
    .marker-zeile {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .marker-nr {
      flex: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #e53e3e;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .marker-zeile input { height: 40px; font-size: 0.9rem; }
    /* Bekannte Schäden aus der letzten Untersuchung: grau, nicht editierbar */
    .skizze-marker.alt { background: #718096; cursor: default; }
    .marker-nr.alt { background: #718096; }
    .marker-alt-text {
      flex: 1;
      font-size: 0.9rem;
      color: #4a5568;
      padding: 0.4rem 0;
    }

    /* ==== Fotos ==== */
    .foto-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      height: 48px;
      border: 1.5px dashed #cbd5e0;
      border-radius: 8px;
      background: #f7fafc;
      color: #4a5568;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .foto-btn:hover { border-color: #4299e1; }
    .foto-btn.gesetzt {
      border-style: solid;
      border-color: #48bb78;
      background: #f0fff4;
      color: #276749;
    }
    .foto-preview {
      display: none;
      width: 100%;
      border-radius: 8px;
      margin-top: 0.5rem;
    }
    .foto-preview.sichtbar { display: block; }

    /* ==== Ergebnis ==== */
    select#ergebnis.e-gruen  { border-color: #48bb78; background: #f0fff4; color: #276749; }
    select#ergebnis.e-gelb   { border-color: #ed8936; background: #fffaf0; color: #7b341e; }
    select#ergebnis.e-rot    { border-color: #e53e3e; background: #fff5f5; color: #9b2c2c; }

    button[type="submit"] {
      width: 100%;
      height: 52px;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    button[type="submit"]:hover { background: #2c5282; }
    button[type="submit"]:disabled { background: #a0aec0; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .status.success { background: #c6f6d5; color: #276749; display: block; }
    .status.error   { background: #fed7d7; color: #9b2c2c; display: block; }
    .status.info    { background: #bee3f8; color: #2a4365; display: block; }
  </style>
</head>

      <h1>Interne Fahrzeuguntersuchung</h1>
      <p>TÜV-Vorcheck durch die Disposition</p>

    <form id="untersuchungForm">

      <div class="abschnitt">Allgemein</div>

      <div class="form-group">
        <label for="name">Name des Prüfers</label>
        <input type="text" id="name" placeholder="Vor- und Nachname" required />
      </div>

      <div class="form-group">
        <label>Fahrzeug</label>
        <div class="fahrzeug-row">
          <select id="fahrzeug-prefix" required>
            <option value="">--</option>
            <option value="EU">EU</option>
            <option value="SLE">SLE</option>
          </select>
          <span class="fahrzeug-sep">-VM</span>
          <input type="number" id="fahrzeug-nummer" placeholder="312" min="1" inputmode="numeric" required style="width:90px;flex:none;" />
        </div>
      </div>

      <!-- Abgleich mit der täglichen Fahrzeugkontrolle -->
      <div class="abgleich" id="abgleichBox"></div>

      <div class="form-group">
        <label for="datum">Datum der Untersuchung</label>
        <input type="date" id="datum" required />
      </div>

      <div class="form-group">
        <label for="kilometerstand">Kilometerstand</label>
        <input type="number" id="kilometerstand" placeholder="z. B. 84500" min="0" inputmode="numeric" required />
      </div>

      <div class="form-group">
        <label for="huGueltig">HU/TÜV gültig bis</label>
        <input type="month" id="huGueltig" required />
      </div>

      <div class="abschnitt">Reifen</div>

      <div class="form-group">
        <label>Profiltiefe in mm (pro Rad)</label>
        <div class="reifen-grid">
          <div>
            <label for="profilVL">Vorne links</label>
            <input type="number" id="profilVL" step="0.1" min="0" max="20" inputmode="decimal" placeholder="z. B. 4,5" required />
          </div>
          <div>
            <label for="profilVR">Vorne rechts</label>
            <input type="number" id="profilVR" step="0.1" min="0" max="20" inputmode="decimal" placeholder="z. B. 4,5" required />
          </div>
          <div>
            <label for="profilHL">Hinten links</label>
            <input type="number" id="profilHL" step="0.1" min="0" max="20" inputmode="decimal" placeholder="z. B. 4,5" required />
          </div>
          <div>
            <label for="profilHR">Hinten rechts</label>
            <input type="number" id="profilHR" step="0.1" min="0" max="20" inputmode="decimal" placeholder="z. B. 4,5" required />
          </div>
        </div>
        <div class="reifen-hinweis" id="reifenHinweis">
          Gesetzliches Minimum: 1,6 mm · Empfehlung Wechsel ab &lt; 3,0 mm
        </div>
      </div>

      <div class="form-group">
        <label for="reifenZustand">Reifenzustand (Risse, Beulen, Alter)</label>
        <select id="reifenZustand" required>
          <option value="">– bitte wählen –</option>
          <option value="OK">OK</option>
          <option value="Mangel">Mangel</option>
        </select>
      </div>

      <div class="abschnitt">Prüfpunkte</div>
      <div id="pruefpunkte"></div>

      <div class="form-group" id="maengelBox" style="display:none; margin-top:1rem;">
        <label for="maengelText">Beschreibung der Mängel</label>
        <textarea id="maengelText" placeholder="Welcher Mangel? Wo am Fahrzeug? Wie schwerwiegend?"></textarea>
      </div>

      <div class="abschnitt">Schadenskizze</div>

      <div class="form-group">
        <label for="kategorie">Kategorie / Fahrzeugtyp</label>
        <select id="kategorie" required>
          <option value="">– bitte wählen –</option>
        </select>
      </div>

      <div class="form-group" id="skizzeGroup" style="display:none;">
        <label>Schäden auf der Skizze antippen</label>
        <div class="skizze-wrap" id="skizzeWrap">
          <img id="skizzeBild" alt="Fahrzeugskizze" />
        </div>
        <div class="skizze-hinweis">Tippen = Marker setzen · Marker antippen = entfernen</div>
        <div class="marker-liste" id="markerListe"></div>
      </div>

      <div class="abschnitt">Fotos</div>

      <div class="form-group">
        <label>Foto Reifen / Profiltiefe (optional)</label>
        <label class="foto-btn" id="btnReifen" for="fotoReifen">📷 Foto aufnehmen / wählen</label>
        <input type="file" id="fotoReifen" accept="image/*" capture="environment" hidden />
        <img class="foto-preview" id="previewReifen" alt="Vorschau Reifen" />
      </div>

      <div class="form-group">
        <label>Foto Mangel / Schaden (optional)</label>
        <label class="foto-btn" id="btnMangel" for="fotoMangel">📷 Foto aufnehmen / wählen</label>
        <input type="file" id="fotoMangel" accept="image/*" capture="environment" hidden />
        <img class="foto-preview" id="previewMangel" alt="Vorschau Mangel" />
      </div>

      <div class="form-group">
        <label>Foto Fahrzeug gesamt (optional)</label>
        <label class="foto-btn" id="btnGesamt" for="fotoGesamt">📷 Foto aufnehmen / wählen</label>
        <input type="file" id="fotoGesamt" accept="image/*" capture="environment" hidden />
        <img class="foto-preview" id="previewGesamt" alt="Vorschau Fahrzeug" />
      </div>

      <div class="abschnitt">Ergebnis</div>

      <div class="form-group">
        <label for="ergebnis">Gesamtergebnis</label>
        <select id="ergebnis" required>
          <option value="">– bitte wählen –</option>
          <option value="Keine Mängel">✅ Keine Mängel</option>
          <option value="Geringe Mängel">🟡 Geringe Mängel – Einsatz möglich</option>
          <option value="Erhebliche Mängel">🟠 Erhebliche Mängel – Werkstatt erforderlich</option>
          <option value="Verkehrsunsicher">🔴 Verkehrsunsicher – Fahrzeug stilllegen</option>
        </select>
      </div>

      <div class="form-group">
        <label for="naechsteUntersuchung">Nächste Untersuchung fällig am</label>
        <input type="date" id="naechsteUntersuchung" required />
      </div>

      <div class="form-group">
        <label for="notiz">Notiz (optional)</label>
        <input type="text" id="notiz" placeholder="" />
      </div>

      <button type="submit" id="submitBtn">Untersuchung absenden</button>
      <div class="status" id="status"></div>
    </form>
  </div>

    };

    // Maße/Qualität für die Foto-Komprimierung
    const FOTO_MAX_KANTE = 1600;
    const FOTO_QUALITAET = 0.7;

    // Nächste Untersuchung: Vorschlag in Monaten
    const INTERVALL_MONATE = 3;

    // ====== STANDARDWERTE ======
    document.getElementById("datum").valueAsDate = new Date();
    (function () {
      const d = new Date();
      d.setMonth(d.getMonth() + INTERVALL_MONATE);
      document.getElementById("naechsteUntersuchung").valueAsDate = d;
    })();

    // ====== PRÜFPUNKTE RENDERN ======
    const pruefContainer = document.getElementById("pruefpunkte");
    PRUEFPUNKTE.forEach((punkt, i) => {
      const row = document.createElement("div");
      row.className = "pruef-row";

      const lbl = document.createElement("span");
      lbl.className = "pruef-label";
      lbl.textContent = punkt;

      const sel = document.createElement("select");
      sel.id = "pruef-" + i;
      sel.required = true;
      sel.innerHTML =
        '<option value="">–</option>' +
        PRUEF_OPTIONEN.map((o) => `<option value="${o}">${o}</option>`).join("");
      sel.addEventListener("change", () => {
        sel.classList.toggle("ok", sel.value === "OK");
        sel.classList.toggle("mangel", sel.value === "Mangel");
        aktualisiereMaengelBox();
      });

      row.appendChild(lbl);
      row.appendChild(sel);
      pruefContainer.appendChild(row);
    });

    function gibtEsMaengel() {
      if (document.getElementById("reifenZustand").value === "Mangel") return true;
      return PRUEFPUNKTE.some((_, i) => document.getElementById("pruef-" + i).value === "Mangel");
    }

    const maengelBox = document.getElementById("maengelBox");
    const maengelText = document.getElementById("maengelText");
    function aktualisiereMaengelBox() {
      maengelBox.style.display = gibtEsMaengel() ? "block" : "none";
    }
    document.getElementById("reifenZustand").addEventListener("change", aktualisiereMaengelBox);

    // ====== REIFENPROFIL: FARB-WARNUNG ======
    const profilFelder = ["profilVL", "profilVR", "profilHL", "profilHR"];
    const reifenHinweis = document.getElementById("reifenHinweis");
    function pruefeProfil() {
      let minWert = Infinity;
      profilFelder.forEach((id) => {
        const el = document.getElementById(id);
        const v = parseFloat(el.value);
        el.classList.remove("warnung", "kritisch");
        if (isNaN(v)) return;
        if (v < 1.6) el.classList.add("kritisch");
        else if (v < 3.0) el.classList.add("warnung");
        if (v < minWert) minWert = v;
      });
      if (minWert === Infinity) {
        reifenHinweis.innerHTML = "Gesetzliches Minimum: 1,6 mm · Empfehlung Wechsel ab &lt; 3,0 mm";
      } else if (minWert < 1.6) {
        reifenHinweis.innerHTML = '<span class="kritisch">⚠️ Unter gesetzlichem Minimum (1,6 mm) – Fahrzeug nicht einsetzen!</span>';
      } else if (minWert < 3.0) {
        reifenHinweis.innerHTML = '<span class="warn">Reifenwechsel einplanen (unter 3,0 mm).</span>';
      } else {
        reifenHinweis.innerHTML = "✅ Profiltiefe in Ordnung.";
      }
    }
    profilFelder.forEach((id) => document.getElementById(id).addEventListener("input", pruefeProfil));

    // ====== ERGEBNIS-FARBE ======
    const ergebnisSel = document.getElementById("ergebnis");
    ergebnisSel.addEventListener("change", () => {
      ergebnisSel.className = "";
      if (ergebnisSel.value === "Keine Mängel") ergebnisSel.classList.add("e-gruen");
      else if (ergebnisSel.value === "Geringe Mängel") ergebnisSel.classList.add("e-gelb");
      else if (ergebnisSel.value) ergebnisSel.classList.add("e-rot");
    });

    // ====== SCHADENSKIZZE ======
    const kategorieSel = document.getElementById("kategorie");
    const skizzeGroup = document.getElementById("skizzeGroup");
    const skizzeWrap = document.getElementById("skizzeWrap");
    const skizzeBild = document.getElementById("skizzeBild");
    const markerListe = document.getElementById("markerListe");
    // Schäden auf der Skizze: alte (aus letzter Untersuchung, grau, werden übernommen)
    // + neue (diese Prüfung, rot). Nummerierung läuft durch: erst alt, dann neu.
    let altMarker = []; // { x, y (0..1), text } – bereits bekannt
    let neuMarker = []; // { x, y (0..1), text } – diese Untersuchung neu erfasst
    function alleMarker() { return altMarker.concat(neuMarker); }

    KATEGORIEN.forEach((k) => {
      const opt = document.createElement("option");
      opt.value = k.label;
      opt.textContent = k.label;
      kategorieSel.appendChild(opt);
    });

    kategorieSel.addEventListener("change", zeigeSkizzeFuerKategorie);

    function zeigeSkizzeFuerKategorie() {
      neuMarker = []; // neue Marker zurücksetzen; bekannte (alt) bleiben erhalten
      const kat = KATEGORIEN.find((k) => k.label === kategorieSel.value);
      if (!kat) {
        skizzeGroup.style.display = "none";
        zeichneMarker();
        return;
      }
      skizzeBild.src = SKIZZEN[kat.bild];
      skizzeGroup.style.display = "block";
      skizzeWrap.classList.add("sichtbar");
      zeichneMarker();
    }

    skizzeWrap.addEventListener("click", (e) => {
      if (e.target.classList.contains("skizze-marker")) return; // Marker-Klick = entfernen (unten)
      const rect = skizzeWrap.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      if (x < 0 || x > 1 || y < 0 || y > 1) return;
      neuMarker.push({ x, y, text: "" });
      zeichneMarker();
    });

    function zeichneMarker() {
      skizzeWrap.querySelectorAll(".skizze-marker").forEach((m) => m.remove());
      markerListe.innerHTML = "";
      const alle = alleMarker();
      alle.forEach((m, i) => {
        const alt = i < altMarker.length; // erste N = bekannte Schäden
        const nr = i + 1;

        const punkt = document.createElement("div");
        punkt.className = "skizze-marker" + (alt ? " alt" : "");
        punkt.style.left = m.x * 100 + "%";
        punkt.style.top = m.y * 100 + "%";
        punkt.textContent = nr;
        if (alt) {
          punkt.title = "Bekannter Schaden aus letzter Untersuchung";
        } else {
          punkt.title = "Antippen zum Entfernen";
          punkt.addEventListener("click", (e) => {
            e.stopPropagation();
            neuMarker.splice(i - altMarker.length, 1);
            zeichneMarker();
          });
        }
        skizzeWrap.appendChild(punkt);

        const zeile = document.createElement("div");
        zeile.className = "marker-zeile";
        const nrEl = document.createElement("span");
        nrEl.className = "marker-nr" + (alt ? " alt" : "");
        nrEl.textContent = nr;
        zeile.appendChild(nrEl);

        if (alt) {
          const label = document.createElement("span");
          label.className = "marker-alt-text";
          label.textContent = (m.text && m.text.trim()) ? m.text : "(bekannter Schaden)";
          zeile.appendChild(label);
        } else {
          const inp = document.createElement("input");
          inp.type = "text";
          inp.placeholder = "Was ist hier beschädigt? (optional)";
          inp.value = m.text;
          inp.addEventListener("input", () => (m.text = inp.value));
          zeile.appendChild(inp);
        }
        markerListe.appendChild(zeile);
      });
    }

    // Skizze + Marker als JPG rendern (für den Versand)
    function skizzeAlsBild() {
      const alle = alleMarker();
      if (!alle.length || !skizzeBild.src || !skizzeBild.naturalWidth) return null;
      const w = skizzeBild.naturalWidth;
      const h = skizzeBild.naturalHeight;
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(skizzeBild, 0, 0, w, h);
      const r = Math.max(12, Math.round(w * 0.018));
      alle.forEach((m, i) => {
        const alt = i < altMarker.length;
        ctx.beginPath();
        ctx.arc(m.x * w, m.y * h, r, 0, Math.PI * 2);
        ctx.fillStyle = alt ? "#718096" : "#e53e3e"; // grau = bekannt, rot = neu
        ctx.fill();
        ctx.lineWidth = Math.max(2, r * 0.15);
        ctx.strokeStyle = "#fff";
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.font = "bold " + Math.round(r * 1.1) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(i + 1), m.x * w, m.y * h);
      });
      return canvas.toDataURL("image/jpeg", 0.8);
    }

    function markerAlsText() {
      return alleMarker()
        .map((m, i) => (i + 1) + ": " + ((m.text || "").trim() || "(ohne Beschreibung)"))
        .join("; ");
    }

    // ====== ABGLEICH MIT DER TÄGLICHEN FAHRZEUGKONTROLLE ======
    const abgleichBox = document.getElementById("abgleichBox");
    let letzterKontrollKm = null;

    function aktuellesFahrzeug() {
      const prefix = document.getElementById("fahrzeug-prefix").value;
      const nummer = document.getElementById("fahrzeug-nummer").value;
      if (!prefix || !nummer) return null;
      return prefix + "-VM " + nummer;
    }

    // Bekannte Schäden der letzten Untersuchung in die Skizze übernehmen (grau)
    function uebernehmeBekannteSchaeden(u) {
      altMarker = [];
      if (u && u.skizze) {
        try {
          const arr = JSON.parse(u.skizze);
          if (Array.isArray(arr)) {
            altMarker = arr
              .filter((m) => m && typeof m.x === "number" && typeof m.y === "number")
              .map((m) => ({ x: m.x, y: m.y, text: m.text || "" }));
          }
        } catch (e) { /* ungültiges JSON ignorieren */ }
      }
      // Passende Skizze automatisch anzeigen, damit die Schäden direkt sichtbar sind
      if (u && u.kategorie && kategorieSel.value !== u.kategorie &&
          KATEGORIEN.some((k) => k.label === u.kategorie)) {
        kategorieSel.value = u.kategorie;
        zeigeSkizzeFuerKategorie(); // setzt neuMarker zurück und zeigt die Skizze
      }
      zeichneMarker();
    }

    async function ladeAbgleich() {
      const fzg = aktuellesFahrzeug();
      letzterKontrollKm = null;
      altMarker = [];
      zeichneMarker();
      if (!fzg) { abgleichBox.classList.remove("sichtbar"); return; }
      if (APPS_SCRIPT_URL.startsWith("HIER_DEINE")) {
        abgleichBox.innerHTML = "<strong>ℹ️ Abgleich</strong>Demo-Modus: Backend noch nicht verbunden.";
        abgleichBox.classList.add("sichtbar");
        return;
      }

      abgleichBox.innerHTML = "<strong>🔄 Abgleich läuft…</strong>Lade letzte Fahrzeugkontrolle für " + fzg + " …";
      abgleichBox.classList.add("sichtbar");

      try {
        const res = await fetch(APPS_SCRIPT_URL + "?fahrzeug=" + encodeURIComponent(fzg));
        const info = await res.json();

        let html = "<strong>📋 Abgleich – " + fzg + "</strong>";

        if (info.kontrolle) {
          const k = info.kontrolle;
          letzterKontrollKm = Number(k.kilometerstand) || null;
          html += "Letzte tägliche Kontrolle: <b>" + (k.datum || "—") + "</b>";
          if (k.name) html += " (" + k.name + ")";
          html += "<br>Kilometerstand: <b>" + (k.kilometerstand || "—") + "</b>";
          if (k.schaeden === "Ja") {
            html += '<br><span class="warn">⚠️ Gemeldeter Schaden: ' + (k.schadenBeschreibung || "ohne Beschreibung") + "</span>";
          } else {
            html += "<br>Schäden gemeldet: Nein";
          }
          if (k.meldungen) html += '<br><span class="warn">Warnleuchten: ' + k.meldungen + "</span>";
        } else {
          html += "Keine tägliche Fahrzeugkontrolle für dieses Fahrzeug gefunden.";
        }

        if (info.untersuchung) {
          const u = info.untersuchung;
          html += "<br>Letzte interne Untersuchung: <b>" + (u.datum || "—") + "</b> – " + (u.ergebnis || "—");
          uebernehmeBekannteSchaeden(u);
          if (altMarker.length) {
            html += '<br><span class="warn">🩹 ' + altMarker.length + " bekannte(r) Schaden/Schäden aus der letzten Untersuchung – grau in die Skizze übernommen. Neue Schäden rot dazu antippen.</span>";
          }
        } else {
          html += "<br>Noch keine interne Untersuchung erfasst – dies ist die erste.";
        }

        abgleichBox.innerHTML = html;
        pruefeKilometer();
      } catch (err) {
        abgleichBox.innerHTML = '<strong>📋 Abgleich</strong><span class="fehler">Abgleich nicht möglich (keine Verbindung). Untersuchung kann trotzdem gespeichert werden.</span>';
      }
    }

    document.getElementById("fahrzeug-prefix").addEventListener("change", ladeAbgleich);
    document.getElementById("fahrzeug-nummer").addEventListener("change", ladeAbgleich);

    // Plausibilität: eingegebener km-Stand vs. letzte Kontrolle
    const kmFeld = document.getElementById("kilometerstand");
    function pruefeKilometer() {
      if (letzterKontrollKm === null) return;
      const v = Number(kmFeld.value);
      if (!v) return;
      if (v < letzterKontrollKm) {
        abgleichBox.innerHTML += '<br><span class="fehler">⚠️ Achtung: Eingegebener km-Stand (' + v + ") liegt unter der letzten Kontrolle (" + letzterKontrollKm + ").</span>";
      }
    }
    kmFeld.addEventListener("change", pruefeKilometer);

    // ====== FOTOS: Komprimieren + Vorschau ======
    const fotoDaten = { reifen: null, mangel: null, gesamt: null };

    function verkleinereBild(file, maxKante, qualitaet) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            const faktor = Math.min(1, maxKante / Math.max(width, height));
            width = Math.round(width * faktor);
            height = Math.round(height * faktor);
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", qualitaet));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function fotoEinrichten(schluessel, inputId, btnId, previewId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      const preview = document.getElementById(previewId);
      input.addEventListener("change", async () => {
        const file = input.files[0];
        if (!file) return;
        btn.textContent = "⏳ Wird verarbeitet…";
        try {
          const dataUrl = await verkleinereBild(file, FOTO_MAX_KANTE, FOTO_QUALITAET);
          fotoDaten[schluessel] = dataUrl;
          preview.src = dataUrl;
          preview.classList.add("sichtbar");
          btn.textContent = "✅ Foto gespeichert – ändern";
          btn.classList.add("gesetzt");
        } catch (err) {
          btn.textContent = "📷 Foto aufnehmen / wählen";
          alert("Foto konnte nicht verarbeitet werden. Bitte erneut versuchen.");
        }
      });
    }

    fotoEinrichten("reifen", "fotoReifen", "btnReifen", "previewReifen");
    fotoEinrichten("mangel", "fotoMangel", "btnMangel", "previewMangel");
    fotoEinrichten("gesamt", "fotoGesamt", "btnGesamt", "previewGesamt");

    // ====== ABSENDEN ======
    document.getElementById("untersuchungForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const status = document.getElementById("status");
      status.className = "status";
      status.textContent = "";

      if (gibtEsMaengel() && !maengelText.value.trim()) {
        status.className = "status error";
        status.textContent = "Bitte die festgestellten Mängel kurz beschreiben.";
        maengelBox.style.display = "block";
        return;
      }
      if (gibtEsMaengel() && !fotoDaten.mangel) {
        status.className = "status error";
        status.textContent = "Bitte ein Foto vom Mangel/Schaden aufnehmen.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Wird gesendet…";

      const pruefwerte = {};
      PRUEFPUNKTE.forEach((punkt, i) => {
        pruefwerte[punkt] = document.getElementById("pruef-" + i).value;
      });

      const data = {
        typ:                  "untersuchung",
        name:                 document.getElementById("name").value,
        fahrzeug:             aktuellesFahrzeug(),
        kategorie:            kategorieSel.value,
        schadenMarkierungen:  markerAlsText(),
        skizzeDaten:          JSON.stringify(alleMarker().map((m) => ({ x: m.x, y: m.y, text: (m.text || "").trim() }))),
        fotoSkizze:           skizzeAlsBild(),
        datum:                document.getElementById("datum").value,
        kilometerstand:       document.getElementById("kilometerstand").value,
        huGueltig:            document.getElementById("huGueltig").value,
        profilVL:             document.getElementById("profilVL").value,
        profilVR:             document.getElementById("profilVR").value,
        profilHL:             document.getElementById("profilHL").value,
        profilHR:             document.getElementById("profilHR").value,
        reifenZustand:        document.getElementById("reifenZustand").value,
        pruefpunkte:          pruefwerte,
        maengelBeschreibung:  maengelText.value.trim(),
        ergebnis:             document.getElementById("ergebnis").value,
        naechsteUntersuchung: document.getElementById("naechsteUntersuchung").value,
        notiz:                document.getElementById("notiz").value,
        fotoReifen:           fotoDaten.reifen,
        fotoMangel:           fotoDaten.mangel,
        fotoGesamt:           fotoDaten.gesamt
      };

      // Demo-Modus, solange kein Backend verbunden ist
      if (APPS_SCRIPT_URL.startsWith("HIER_DEINE")) {
        console.log("DEMO – diese Daten würden gesendet:", data);
        status.className = "status info";
        status.textContent = "Demo-Modus: Backend noch nicht verbunden. Daten siehe Konsole.";
        btn.disabled = false;
        btn.textContent = "Untersuchung absenden";
        return;
      }

      try {
        // Ohne eigenen Content-Type-Header -> "simple request", keine CORS-Preflight
        const res = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.status !== "ok") throw new Error(result.message || "Serverfehler");

        status.className = "status success";
        status.textContent = "Interne Untersuchung erfolgreich gespeichert!";
        formularZuruecksetzen();
      } catch (err) {
        status.className = "status error";
        status.textContent = "Fehler beim Senden. Bitte erneut versuchen.";
      }

      btn.disabled = false;
      btn.textContent = "Untersuchung absenden";
    });

    function formularZuruecksetzen() {
      document.getElementById("untersuchungForm").reset();
      document.getElementById("datum").valueAsDate = new Date();
      const d = new Date();
      d.setMonth(d.getMonth() + INTERVALL_MONATE);
      document.getElementById("naechsteUntersuchung").valueAsDate = d;

      Object.keys(fotoDaten).forEach((k) => (fotoDaten[k] = null));
      [["previewReifen","btnReifen"],["previewMangel","btnMangel"],["previewGesamt","btnGesamt"]].forEach(([pid, bid]) => {
        const p = document.getElementById(pid);
        p.src = ""; p.classList.remove("sichtbar");
        const b = document.getElementById(bid);
        b.textContent = "📷 Foto aufnehmen / wählen";
        b.classList.remove("gesetzt");
      });

      PRUEFPUNKTE.forEach((_, i) => {
        const sel = document.getElementById("pruef-" + i);
        sel.classList.remove("ok", "mangel");
      });
      ergebnisSel.className = "";
      profilFelder.forEach((id) => document.getElementById(id).classList.remove("warnung", "kritisch"));
      reifenHinweis.innerHTML = "Gesetzliches Minimum: 1,6 mm · Empfehlung Wechsel ab &lt; 3,0 mm";
      maengelBox.style.display = "none";
      abgleichBox.classList.remove("sichtbar");
      letzterKontrollKm = null;

      altMarker = [];
      neuMarker = [];
      skizzeGroup.style.display = "none";
      skizzeWrap.classList.remove("sichtbar");
      skizzeBild.src = "";
      zeichneMarker();
    }
  </script>
</body>
</html>
